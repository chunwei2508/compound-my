<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compound MY</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f4f6f5;
    font-family:-apple-system,BlinkMacSystemFont;
}

h1{
    color:#0E7A53;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px #ddd;
}

input{
    width:100%;
    padding:15px;
    margin:8px 0;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#0E7A53;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
}

.result{
    font-size:18px;
    line-height:1.8;
}

.money{
    color:#0E7A53;
    font-weight:bold;
}

</style>

</head>


<body>


<h1>
Compound MY 🇲🇾
</h1>


<div class="card">

<h2>📈 复利计算器</h2>


<input id="start" type="number" placeholder="本金 RM">

<input id="monthly" type="number" placeholder="每月投资 RM">

<input id="rate" type="number" placeholder="年收益率 %">

<input id="years" type="number" placeholder="投资年数">


<button onclick="compound()">
计算财富增长
</button>


<div class="result" id="compoundResult"></div>


</div>



<div class="card">

<h2>🔥 FIRE 财务自由</h2>


<input id="expense" type="number" placeholder="每月生活费 RM">

<button onclick="fire()">
计算 FIRE
</button>


<div class="result" id="fireResult"></div>


</div>



<script>


function rm(x){

return "RM " + 
x.toLocaleString(
"en-MY",
{
maximumFractionDigits:2
});

}



function compound(){


let start =
Number(document.getElementById("start").value);


let monthly =
Number(document.getElementById("monthly").value);


let rate =
Number(document.getElementById("rate").value)/100;


let years =
Number(document.getElementById("years").value);



let total=start;


for(
let i=0;
i<years*12;
i++
){

total =
total*(1+rate/12)+monthly;

}


let invested =
start + monthly*years*12;


let profit =
total-invested;


document.getElementById("compoundResult").innerHTML =

`
<br>

总投入：
<span class="money">
${rm(invested)}
</span>

<br>

复利收益：
<span class="money">
${rm(profit)}
</span>

<br>

最终资产：
<span class="money">
${rm(total)}
</span>

`;

}




function fire(){


let expense =
Number(document.getElementById("expense").value);


let target =
expense*12*25;


document.getElementById("fireResult").innerHTML=

`
<br>

你的 FIRE 目标：

<br>

<span class="money">

${rm(target)}

</span>

`;

}


</script>


</body>

</html>

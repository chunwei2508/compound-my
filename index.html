<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compound MY</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
padding:20px;
background:#f4f6f5;
font-family:-apple-system,BlinkMacSystemFont;
}

h1{
color:#0E7A53;
}

.card{
background:white;
padding:20px;
border-radius:22px;
margin-bottom:20px;
box-shadow:0 5px 15px #ddd;
}

input{
width:100%;
padding:15px;
margin:8px 0;
border-radius:15px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#0E7A53;
color:white;
border:none;
border-radius:15px;
font-size:17px;
margin-top:8px;
}

.small button{
width:48%;
}

.money{
color:#0E7A53;
font-weight:bold;
font-size:22px;
}

.result{
line-height:2;
}

</style>

</head>


<body>


<h1>📈 Compound MY 🇲🇾</h1>


<div class="card">

<h2>财富复利计算器</h2>


<input id="start" type="number" placeholder="本金 RM">

<input id="monthly" type="number" placeholder="每月投资 RM">

<input id="rate" type="number" placeholder="年收益率 %">

<input id="years" type="number" placeholder="投资年数">


<div class="small">

<button onclick="setRate(5.5)">
EPF 5.5%
</button>

<button onclick="setRate(10)">
S&P500 10%
</button>

</div>


<button onclick="calculate()">
开始计算
</button>


<div class="result" id="result"></div>


<canvas id="chart"></canvas>


</div>




<div class="card">

<h2>🔥 FIRE 财务自由</h2>


<input id="expense" type="number" placeholder="每月生活费 RM">


<button onclick="fire()">
计算 FIRE
</button>


<div id="fireResult"></div>


</div>





<script>


let chart;


function rm(x){

return "RM " +

x.toLocaleString(
"en-MY",
{
maximumFractionDigits:0
});

}



function setRate(x){

document.getElementById("rate").value=x;

}




function calculate(){


let start=
Number(document.getElementById("start").value);


let monthly=
Number(document.getElementById("monthly").value);


let rate=
Number(document.getElementById("rate").value)/100;


let years=
Number(document.getElementById("years").value);



let total=start;

let data=[];

let labels=[];



for(let y=1;y<=years;y++){

for(let m=0;m<12;m++){

total=
total*(1+rate/12)+monthly;

}

labels.push("Year "+y);

data.push(total);

}



let invested=
start+(monthly*years*12);


let profit=
total-invested;



document.getElementById("result").innerHTML=

`

<br>

总投入：

<div class="money">
${rm(invested)}
</div>


复利收益：

<div class="money">
${rm(profit)}
</div>


最终资产：

<div class="money">
${rm(total)}
</div>


百万目标：

${((total/1000000)*100).toFixed(1)}%

`;




if(chart){

chart.destroy();

}


chart=new Chart(

document.getElementById("chart"),

{

type:"line",

data:{

labels:labels,

datasets:[{

label:"资产成长 RM",

data:data

}]

}

}

);

}





function fire(){


let expense=

Number(document.getElementById("expense").value);



let target=

expense*12*25;



document.getElementById("fireResult").innerHTML=

`

<h2>

你的 FIRE 数字：

</h2>


<div class="money">

${rm(target)}

</div>


`;

}


</script>


</body>

</html>
